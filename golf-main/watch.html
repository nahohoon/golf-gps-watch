<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#080f09">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>⛳ Watch GPS</title>
  <style>
    :root {
      --bg:#080f09; --bg2:#0d1a0f; --card:#122015;
      --gold:#c9a84c; --gold-dim:#7a5e20;
      --green:#2d8a3e; --green-dark:#1a5c2a;
      --text:#ddeee0; --muted:#6a8e72; --dim:#3a5a40;
      --red:#e05555; --orange:#e09030; --border:#1a3020;
    }
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    html { height: 100%; }
    body {
      font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg); color: var(--text);
      height: 100dvh; width: 100%; max-width: 360px;
      margin: 0 auto; display: flex; flex-direction: column;
      overflow: hidden; user-select: none;
    }

    /* ── HEADER ── */
    .w-header {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 10px 16px 9px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(160deg, #0a1e10, #0f2a16);
      flex-shrink: 0;
    }
    .w-title { font-size: 13px; font-weight: 800; color: var(--gold); }
    .btn-back {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 13px; font-weight: 700;
      padding: 4px 0; display: flex; align-items: center; gap: 4px;
      font-family: inherit; flex-shrink: 0;
    }
    .btn-back:active { color: var(--text); }
    .gps-chip {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--muted); font-weight: 600;
    }
    .gdot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--dim); flex-shrink: 0;
    }
    .gdot.ok  { background: #4caf75; }
    .gdot.mid { background: var(--orange); }
    .gdot.bad { background: var(--red); }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }
    .pls { animation: pulse 1.1s ease-in-out infinite; }

    /* ── MAIN CONTENT ── */
    .w-main {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 8px 20px 4px;
      min-height: 0;
    }

    /* Hole badge */
    .hole-pill {
      background: var(--gold); color: #060e07;
      border-radius: 24px; padding: 5px 22px;
      font-size: 14px; font-weight: 900; letter-spacing: 2px;
      margin-bottom: 16px;
    }

    /* Distance — big number */
    .dist-wrap { text-align: center; }
    .dist-num {
      font-size: 96px; font-weight: 900; color: var(--gold);
      line-height: 0.9; letter-spacing: -5px;
      display: block;
    }
    .dist-num.wait { font-size: 56px; color: var(--dim); letter-spacing: 0; }
    .dist-unit { font-size: 18px; color: var(--muted); font-weight: 400; margin-top: 5px; }
    .dist-yd {
      font-size: 26px; font-weight: 800; color: var(--muted);
      margin-top: 10px;
    }
    .dist-yd b { color: var(--text); }

    /* ── NAV BUTTONS ── */
    .w-nav {
      display: flex; height: 90px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .btn-nav {
      flex: 1; background: none; border: none; cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 4px; color: var(--text);
      transition: background 0.12s;
      font-family: inherit;
    }
    .btn-nav:active { background: rgba(201,168,76,0.13); }
    .btn-nav:first-child { border-right: 1px solid var(--border); }
    .btn-nav .n-arrow { font-size: 30px; line-height: 1; }
    .btn-nav .n-lbl {
      font-size: 9px; color: var(--muted);
      font-weight: 700; letter-spacing: 1.5px;
    }

    /* ── START OVERLAY ── */
    .start-overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 18px; z-index: 100;
      padding: 24px;
    }
    .start-overlay.hidden { display: none; }

    /* 공통 overlay 요소 */
    .so-icon  { font-size: 44px; }
    .so-title { font-size: 15px; font-weight: 800; color: var(--gold); text-align: center; }
    .so-note  { font-size: 10px; color: var(--dim); text-align: center; line-height: 1.6; }

    /* GPS 시작 버튼 */
    .btn-start {
      width: 128px; height: 128px; border-radius: 50%;
      background: linear-gradient(135deg, var(--green-dark), var(--green));
      border: none; cursor: pointer; font-family: inherit;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 7px;
      color: #fff;
      box-shadow: 0 0 28px rgba(45,138,62,0.45);
      transition: transform 0.1s;
    }
    .btn-start:active { transform: scale(0.93); }
    .btn-start .bi { font-size: 30px; }
    .btn-start .bt { font-size: 14px; font-weight: 900; }

    /* 탐색 중 상태 */
    .so-scan-icon { font-size: 44px; }
    .so-scan-txt  { font-size: 14px; font-weight: 800; color: var(--muted); text-align: center; }
    .so-scan-sub  { font-size: 10px; color: var(--dim); text-align: center; line-height: 1.6; }

    /* 오류 상태 */
    .so-err-icon { font-size: 38px; }
    .so-err-msg  {
      font-size: 13px; font-weight: 700; color: var(--text);
      text-align: center; line-height: 1.7; padding: 0 6px;
    }
    .so-err-hint {
      font-size: 10px; color: var(--dim);
      text-align: center; line-height: 1.6; padding: 0 8px;
      display: none;
    }
    .btn-retry {
      padding: 13px 26px;
      background: rgba(224,85,85,0.12);
      border: 1.5px solid var(--red); color: #f08080;
      border-radius: 24px; font-size: 14px; font-weight: 900;
      cursor: pointer; font-family: inherit;
      transition: background 0.12s;
    }
    .btn-retry:active { background: rgba(224,85,85,0.28); }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 104px; left: 50%;
      transform: translateX(-50%);
      background: rgba(224,85,85,0.93); color: #fff;
      border-radius: 20px; padding: 7px 16px;
      font-size: 12px; font-weight: 700;
      white-space: nowrap; display: none; z-index: 200;
    }

    /* ── HOLE LIMIT INDICATOR ── */
    .hole-hint {
      font-size: 9px; color: var(--dim);
      margin-top: 6px; letter-spacing: 0.5px;
      min-height: 14px;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="w-header">
  <button class="btn-back" onclick="window.location.href='./index.html'" aria-label="메인으로">‹ 메인</button>
  <div class="w-title">⛳ GPS 캐디</div>
  <div class="gps-chip">
    <div class="gdot pls" id="gdot"></div>
    <span id="gps-lbl">탐색 중</span>
  </div>
</div>

<!-- MAIN -->
<div class="w-main">
  <div class="hole-pill" id="hole-pill">HOLE 1</div>
  <div class="dist-wrap">
    <span class="dist-num wait" id="dist-num">···</span>
    <div class="dist-unit">m</div>
    <div class="dist-yd"><b id="dist-yd">···</b> yd</div>
  </div>
  <div class="hole-hint" id="hole-hint"></div>
</div>

<!-- NAV -->
<div class="w-nav">
  <button class="btn-nav" onclick="prevHole()" aria-label="이전 홀">
    <span class="n-arrow">◀</span>
    <span class="n-lbl">PREV</span>
  </button>
  <button class="btn-nav" onclick="nextHole()" aria-label="다음 홀">
    <span class="n-arrow">▶</span>
    <span class="n-lbl">NEXT</span>
  </button>
</div>

<!-- START OVERLAY (3가지 상태: initial / scanning / error) -->
<div class="start-overlay" id="start-overlay">

  <!-- 초기 상태: GPS 시작 버튼 -->
  <div id="so-initial">
    <div style="display:flex;flex-direction:column;align-items:center;gap:18px;">
      <div class="so-icon">⛳</div>
      <div class="so-title">골프 GPS 워치</div>
      <button class="btn-start" onclick="initGPS()">
        <span class="bi">📡</span>
        <span class="bt">GPS 시작</span>
      </button>
      <div class="so-note">버튼을 탭하면<br>GPS 거리 측정이 시작됩니다</div>
    </div>
  </div>

  <!-- 탐색 중 상태 -->
  <div id="so-scanning" style="display:none;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
      <div class="so-scan-icon pls">📡</div>
      <div class="so-scan-txt">GPS 탐색 중...</div>
      <div class="so-scan-sub">위치를 확인하고 있습니다<br>야외로 이동하면 더 빠릅니다</div>
    </div>
  </div>

  <!-- 오류 상태 -->
  <div id="so-error" style="display:none;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
      <div class="so-err-icon">⚠️</div>
      <div class="so-err-msg" id="so-err-msg">GPS 오류가 발생했습니다</div>
      <div class="so-err-hint" id="so-err-hint"></div>
      <button class="btn-retry" onclick="retryGPS()">🔄 GPS 다시 시도</button>
    </div>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ══ 홀 좌표 데이터 (index.html과 동일한 18홀 좌표) ══
var HOLES = [
  {hole:1,  lat:35.902494, lng:128.663617},
  {hole:2,  lat:35.903894, lng:128.662169},
  {hole:3,  lat:35.900303, lng:128.661111},
  {hole:4,  lat:35.903389, lng:128.662028},
  {hole:5,  lat:35.905872, lng:128.657864},
  {hole:6,  lat:35.904975, lng:128.656803},
  {hole:7,  lat:35.903142, lng:128.660486},
  {hole:8,  lat:35.901367, lng:128.659561},
  {hole:9,  lat:35.899169, lng:128.661744},
  {hole:10, lat:35.901589, lng:128.664028},
  {hole:11, lat:35.904119, lng:128.662375},
  {hole:12, lat:35.900428, lng:128.660836},
  {hole:13, lat:35.903408, lng:128.662303},
  {hole:14, lat:35.906192, lng:128.658089},
  {hole:15, lat:35.905117, lng:128.656419},
  {hole:16, lat:35.902775, lng:128.660492},
  {hole:17, lat:35.901711, lng:128.659156},
  {hole:18, lat:35.899167, lng:128.661739}
];

// ══ 상태 ══
var curHole = 1;
var watchId = null;
var gpsPos  = null;

// GPS 옵션 (워치 환경 고려: 긴 타임아웃, 캐시 금지)
var GPS_OPTS = {enableHighAccuracy: true, timeout: 30000, maximumAge: 0};

// ══ Haversine 거리 계산 (index.html과 동일) ══
function haversine(a1, o1, a2, o2) {
  var R  = 6371000;
  var dl = (a2 - a1) * Math.PI / 180;
  var do2 = (o2 - o1) * Math.PI / 180;
  var a  = Math.sin(dl/2)*Math.sin(dl/2)
         + Math.cos(a1*Math.PI/180)*Math.cos(a2*Math.PI/180)
         * Math.sin(do2/2)*Math.sin(do2/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}
function toYd(m) { return Math.round(m * 1.09361); }

// ══ 화면 렌더 ══
function render() {
  document.getElementById('hole-pill').textContent = 'HOLE ' + curHole;
  var hint = document.getElementById('hole-hint');
  hint.textContent = curHole === 1 ? '◀ 첫 번째 홀' : curHole === 18 ? '마지막 홀 ▶' : '';

  if (!gpsPos) {
    document.getElementById('dist-num').textContent = '···';
    document.getElementById('dist-num').className = 'dist-num wait';
    document.getElementById('dist-yd').textContent = '···';
    return;
  }
  var h  = HOLES[curHole - 1];
  var dm = Math.round(haversine(gpsPos.lat, gpsPos.lng, h.lat, h.lng));
  document.getElementById('dist-num').textContent = dm;
  document.getElementById('dist-num').className = 'dist-num';
  document.getElementById('dist-yd').textContent = toYd(dm);
}

// ══ 헤더 GPS 상태 도트 ══
function setGPSChip(state, acc) {
  var dot = document.getElementById('gdot');
  var lbl = document.getElementById('gps-lbl');
  switch (state) {
    case 'scanning': dot.className = 'gdot pls';  lbl.textContent = '탐색 중';                        break;
    case 'ok':       dot.className = 'gdot ok';   lbl.textContent = '양호 ' + Math.round(acc) + 'm'; break;
    case 'mid':      dot.className = 'gdot mid';  lbl.textContent = '보통 ' + Math.round(acc) + 'm'; break;
    case 'bad':      dot.className = 'gdot bad';  lbl.textContent = '낮음 ' + Math.round(acc) + 'm'; break;
    default:         dot.className = 'gdot bad';  lbl.textContent = 'GPS 오류';                       break;
  }
}

// ══ 오버레이 상태 전환 ══
function showOverlay(state) {
  document.getElementById('start-overlay').classList.remove('hidden');
  document.getElementById('so-initial').style.display  = state === 'initial'  ? '' : 'none';
  document.getElementById('so-scanning').style.display = state === 'scanning' ? '' : 'none';
  document.getElementById('so-error').style.display    = state === 'error'    ? '' : 'none';
}

function hideOverlay() {
  document.getElementById('start-overlay').classList.add('hidden');
}

// ══ GPS 에러 처리 ══
function handleGPSError(err) {
  watchId = null;
  gpsPos  = null;
  setGPSChip('error');

  var msg  = '';
  var hint = '';

  switch (err.code) {
    case 1: // PERMISSION_DENIED
      msg  = '위치 권한이 거부되었습니다.';
      hint = '워치 설정 → Samsung Internet → 권한 → 위치를 "허용"으로 변경하세요.';
      break;
    case 2: // POSITION_UNAVAILABLE
      msg  = '위치를 확인할 수 없습니다.';
      hint = '실내에서는 GPS가 약할 수 있습니다. 야외로 이동 후 다시 시도하세요.';
      break;
    case 3: // TIMEOUT
      msg  = 'GPS 응답 시간이 초과되었습니다.';
      hint = '야외에서 하늘이 잘 보이는 곳으로 이동 후 다시 시도하세요.';
      break;
    default:
      msg  = 'GPS 오류가 발생했습니다.';
      hint = '잠시 후 다시 시도해주세요.';
  }

  document.getElementById('so-err-msg').textContent  = msg;
  var hintEl = document.getElementById('so-err-hint');
  if (hint) {
    hintEl.textContent    = hint;
    hintEl.style.display  = 'block';
  } else {
    hintEl.style.display  = 'none';
  }
  showOverlay('error');
}

// ══ watchPosition 시작 (초기 위치 획득 후 호출) ══
function startWatchPosition() {
  if (watchId !== null) {
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
  }
  watchId = navigator.geolocation.watchPosition(
    function(position) {
      gpsPos = {
        lat: position.coords.latitude,
        lng: position.coords.longitude,
        acc: position.coords.accuracy
      };
      hideOverlay();
      var acc = gpsPos.acc;
      if      (acc <= 10) setGPSChip('ok',  acc);
      else if (acc <= 20) setGPSChip('mid', acc);
      else                setGPSChip('bad', acc);
      render();
    },
    handleGPSError,
    GPS_OPTS
  );
}

// ══ GPS 초기화: getCurrentPosition 먼저 → 성공하면 watchPosition ══
function initGPS() {
  // navigator.geolocation 지원 여부 체크
  if (!navigator.geolocation) {
    document.getElementById('so-err-msg').textContent = '이 브라우저는 위치 기능을 지원하지 않습니다.';
    var hintEl = document.getElementById('so-err-hint');
    hintEl.textContent   = 'Samsung Internet 최신 버전을 사용하거나 다른 브라우저를 시도하세요.';
    hintEl.style.display = 'block';
    document.getElementById('so-error').querySelector('.btn-retry').style.display = 'none';
    showOverlay('error');
    return;
  }

  // 탐색 중 상태 표시
  showOverlay('scanning');
  setGPSChip('scanning');

  // 1단계: getCurrentPosition으로 초기 위치 1회 획득
  // (일부 워치 브라우저에서 watchPosition이 바로 실패하는 문제 방지)
  navigator.geolocation.getCurrentPosition(
    function(position) {
      // 초기 위치 획득 성공 → 화면 즉시 표시 후 watchPosition 시작
      gpsPos = {
        lat: position.coords.latitude,
        lng: position.coords.longitude,
        acc: position.coords.accuracy
      };
      hideOverlay();
      var acc = gpsPos.acc;
      if      (acc <= 10) setGPSChip('ok',  acc);
      else if (acc <= 20) setGPSChip('mid', acc);
      else                setGPSChip('bad', acc);
      render();
      // 2단계: 이후 자동 갱신을 위해 watchPosition 시작
      startWatchPosition();
    },
    handleGPSError,
    GPS_OPTS
  );
}

// ══ 다시 시도 ══
function retryGPS() {
  initGPS();
}

// ══ 홀 이동 ══
function prevHole() {
  if (curHole > 1)  { curHole--; render(); buzz(); }
}
function nextHole() {
  if (curHole < 18) { curHole++; render(); buzz(); }
}
function buzz() {
  if (navigator.vibrate) navigator.vibrate(25);
}

// ══ 토스트 메시지 ══
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = '⚠ ' + msg;
  el.style.display = 'block';
  setTimeout(function() { el.style.display = 'none'; }, 3000);
}

// ══ 초기화 ══
window.addEventListener('load', function() {
  render(); // 초기 빈 상태 렌더

  if (!navigator.geolocation) {
    // GPS 미지원 브라우저: 초기 오버레이에 바로 오류 표시
    document.getElementById('so-err-msg').textContent = '이 브라우저는 위치 기능을 지원하지 않습니다.';
    var hintEl = document.getElementById('so-err-hint');
    hintEl.textContent   = 'Samsung Internet 최신 버전을 사용하거나 다른 브라우저를 시도하세요.';
    hintEl.style.display = 'block';
    document.getElementById('so-error').querySelector('.btn-retry').style.display = 'none';
    showOverlay('error');
    return;
  }

  // 권한이 이미 허용된 경우 오버레이 없이 자동 시작 시도
  // (빠른 응답을 위해 캐시 허용 옵션으로 먼저 시도)
  navigator.geolocation.getCurrentPosition(
    function() {
      initGPS(); // 권한 확인됨 → 정식 초기화
    },
    function() {
      // 즉시 실패 or 권한 미결정 → 초기 오버레이 유지, 사용자 탭 대기
      showOverlay('initial');
    },
    {enableHighAccuracy: false, timeout: 2000, maximumAge: 60000}
  );
});

// ══ 백그라운드 전환 시 GPS 관리 (배터리 절약) ══
document.addEventListener('visibilitychange', function() {
  if (document.hidden) {
    // 백그라운드: watchPosition 중지
    if (watchId !== null) {
      navigator.geolocation.clearWatch(watchId);
      watchId = null;
      gpsPos  = null;
    }
  } else {
    // 포그라운드 복귀: 오버레이가 없는 상태(=GPS 활성화 상태)였으면 재시작
    var overlayHidden = document.getElementById('start-overlay').classList.contains('hidden');
    if (overlayHidden) {
      initGPS();
    }
  }
});
</script>

</body>
</html>
